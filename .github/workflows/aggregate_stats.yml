# Firestore 통계 집계 → data-aggregates 브랜치에 커밋
# Secrets 필요: FIREBASE_SERVICE_ACCOUNT (서비스 계정 키 JSON)

name: Aggregate Firestore Stats

on:
  # 테스트 단계 동안 cron 자동 실행을 비활성화한다.
  # 배포 직전 아래 schedule 2줄의 주석을 해제할 것.
  # schedule:
  #   - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --prefix tool

      - name: Write service account key to temp file
        run: |
          KEY_FILE="$(mktemp)"
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$KEY_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEY_FILE" >> "$GITHUB_ENV"
          echo "KEY_FILE=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Run aggregate script
        run: node tool/aggregate_stats.js ./out

      - name: Remove temp key file
        if: always()
        run: rm -f "$KEY_FILE"

      - name: Push results to data-aggregates branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data-aggregates || true
          git checkout data-aggregates 2>/dev/null || git checkout --orphan data-aggregates
          git rm -rf --ignore-unmatch .
          cp out/aggregates.json .
          cp out/full_report.json .
          cp out/report.md .
          git add aggregates.json full_report.json report.md
          git diff --cached --quiet || git commit -m "chore: update aggregated stats $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin data-aggregates
