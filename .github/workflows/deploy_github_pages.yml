# GitHub Pages에 Flutter Web 배포
# 저장소 설정 → Pages → Source: GitHub Actions
#
# 수동 배포 전용. main 에 push 해도 자동 배포되지 않는다.
# 배포하려면:
#  - GitHub > Actions 탭 > 이 워크플로우 선택 > "Run workflow"
#  - 또는 터미널: gh workflow run deploy_github_pages.yml

name: Deploy Flutter Web to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build web (base-href = /repo name/)
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
