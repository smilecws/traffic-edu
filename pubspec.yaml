name: quiz_app
description: 1000문제 랜덤 40문제 퀴즈 앱

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  video_player: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: assets/app_icon.png
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - assets/questions_kor.json
    - assets/questions_eng.json
    - assets/questions_chi.json
    - assets/questions_vi.json
    - assets/app_icon.png
    - assets/quiz_icon.png
    - assets/license_icon.png
    - assets/driving_disqualification_merged.json
    - assets/questions_images/
    - assets/questions_videos/
