name: quiz_app
description: 1000문제 랜덤 40문제 퀴즈 앱

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1
  video_player: ^2.10.0
  http: ^1.2.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: assets/app_icon.png
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true

flutter:
  uses-material-design: true
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800
        - asset: assets/fonts/Pretendard-Black.otf
          weight: 900
  assets:
    - assets/questions_kor.json
    - assets/questions_eng.json
    - assets/questions_chi.json
    - assets/questions_vi.json
    - assets/app_icon.png
    - assets/quiz_icon.png
    - assets/license_icon.png
    - assets/driving_disqualification_merged.json
    - assets/question_subcategory.json
    - assets/study/
    - assets/images/
    - assets/questions_videos/
